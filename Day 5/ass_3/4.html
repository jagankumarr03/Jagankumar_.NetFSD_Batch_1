<!DOCTYPE html>
<html>
<head>
    <title>Mini Expense Tracker</title>
</head>
<body>

    <h2>Expense Tracker</h2>

    <input type="text" id="title" placeholder="Expense Title">
    <input type="number" id="amount" placeholder="Amount">
    <input type="date" id="date">

    <br><br>

    <button onclick="addExpense()">Add Expense</button>
    <button onclick="viewExpenses()">View Expenses</button>
    <button onclick="deleteAllExpenses()">Delete All</button>

    <h3>Expense List</h3>
    <ul id="expenseList"></ul>

    <script>

        var db = openDatabase("ExpenseDB", "1.0", "Expense Database", 5 * 1024 * 1024);

        db.transaction(function (tx) {
            tx.executeSql(
                "CREATE TABLE IF NOT EXISTS expenses (id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT, amount REAL, date TEXT)",
                [],
                function () {
                    console.log("Table created successfully");
                },
                function (tx, error) {
                    console.error("Table creation error:", error.message);
                }
            );
        });

        function addExpense() {

            var title = document.getElementById("title").value;
            var amount = document.getElementById("amount").value;
            var date = document.getElementById("date").value;

            db.transaction(function (tx) {
                tx.executeSql(
                    "INSERT INTO expenses (title, amount, date) VALUES (?, ?, ?)",
                    [title, amount, date],
                    function () {
                        alert("Expense added successfully");
                        viewExpenses();
                    },
                    function (tx, error) {
                        alert("Insert Error: " + error.message);
                    }
                );
            }, function (error) {
                alert("Transaction Error: " + error.message);
            });
        }

        function viewExpenses() {

            var list = document.getElementById("expenseList");
            list.innerHTML = "";

            db.transaction(function (tx) {
                tx.executeSql(
                    "SELECT * FROM expenses",
                    [],
                    function (tx, results) {

                        for (var i = 0; i < results.rows.length; i++) {

                            var row = results.rows.item(i);

                            var li = document.createElement("li");
                            li.innerHTML =
                                row.title + " - ₹" +
                                row.amount + " - " +
                                row.date;

                            list.appendChild(li);
                        }
                    },
                    function (tx, error) {
                        alert("Select Error: " + error.message);
                    }
                );
            });
        }

        function deleteAllExpenses() {

            db.transaction(function (tx) {
                tx.executeSql(
                    "DELETE FROM expenses",
                    [],
                    function () {
                        alert("All expenses deleted");
                        viewExpenses();
                    },
                    function (tx, error) {
                        alert("Delete Error: " + error.message);
                    }
                );
            });
        }

    </script>

</body>
</html>
