<!DOCTYPE html>
<html>
<head>
    <title>Daily Notes App</title>
</head>
<body>

    <h2>Daily Notes</h2>

    <!-- Textarea -->
    <textarea id="noteArea" rows="8" cols="40" placeholder="Write your notes here..."></textarea>
    <br><br>

    <!-- Buttons with inline onclick -->
    <button onclick="saveNote()">Save</button>
    <button onclick="clearNote()">Clear</button>

    <script>

        // Load saved note when page loads
        window.onload = function () {
            var savedNote = localStorage.getItem("dailyNote");

            if (savedNote !== null) {
                document.getElementById("noteArea").value = savedNote;
            }
        };

        // Save note function
        function saveNote() {
            var noteText = document.getElementById("noteArea").value;

            localStorage.setItem("dailyNote", noteText);

            alert("Note Saved Successfully!");
        }

        // Clear note function
        function clearNote() {
            localStorage.removeItem("dailyNote");

            document.getElementById("noteArea").value = "";

            alert("Note Cleared!");
        }

    </script>

</body>
</html>
