<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Admin panel for managing events in EventSphere">
<meta name="keywords" content="event management admin panel">
<meta name="author" content="EventSphere">

<title>Admin Panel | EventSphere</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">EventSphere</a>
<a href="index.html" class="btn btn-light">View Events</a>
</div>
</nav>

<!-- PAGE TITLE -->

<div class="container mt-4 text-center">
<h2>Admin Event Management</h2>
<p class="text-muted">Create and manage events</p>
</div>

<!-- ADD EVENT FORM -->

<div class="container mt-4">

<div class="card shadow">

<div class="card-body">

<h4>Add New Event</h4>

<form id="eventForm">

<div class="mb-3">
<label class="form-label">Event Title</label>
<input type="text" id="title" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea id="description" class="form-control" required></textarea>
</div>

<div class="mb-3">
<label class="form-label">Date</label>
<input type="date" id="date" class="form-control" required>
</div>

<div class="mb-3">

<label class="form-label">Location</label>

<input
type="text"
id="location"
class="form-control"
list="cities"
placeholder="Select City"
required

>

<datalist id="cities">
<option value="Chennai">
<option value="Mumbai">
<option value="Delhi">
<option value="Bangalore">
<option value="Hyderabad">
</datalist>

</div>

<div class="mb-3">
<label class="form-label">Capacity</label>
<input type="number" id="capacity" class="form-control" min="1" max="1000" required>
</div>

<button class="btn btn-success">Add Event</button>

</form>

</div>

</div>

</div>

<!-- EVENTS TABLE -->

<div class="container mt-5">

<h4>Existing Events</h4>

<table class="table table-bordered mt-3">

<thead class="table-dark">

<tr>
<th>Title</th>
<th>Date</th>
<th>Location</th>
<th>Seats Left</th>
<th>Action</th>
</tr>

</thead>

<tbody id="eventTable">

</tbody>

</table>

</div>

<script>

const API_URL = "http://localhost:3000/events";

const form = document.getElementById("eventForm");


// Prevent past date
const today = new Date().toISOString().split("T")[0];
document.getElementById("date").setAttribute("min", today);



// ADD EVENT
form.addEventListener("submit", async function(e){

e.preventDefault();

const capacityValue = Number(document.getElementById("capacity").value);

const event = {

title: document.getElementById("title").value,
description: document.getElementById("description").value,
date: document.getElementById("date").value,
location: document.getElementById("location").value,
capacity: capacityValue,
availableSeats: capacityValue

};


await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify(event)

});


form.reset();

loadEvents();

});



// LOAD EVENTS
async function loadEvents(){

const response = await fetch(API_URL);

const events = await response.json();

displayEvents(events);

}



// DISPLAY EVENTS
function displayEvents(events){

const table = document.getElementById("eventTable");

table.innerHTML = "";

events.forEach(event => {

const row = document.createElement("tr");

row.innerHTML = `
<td>${event.title}</td>
<td>${event.date}</td>
<td>${event.location}</td>
<td>${event.availableSeats} / ${event.capacity}</td>
<td>
<button class="btn btn-danger btn-sm">Delete</button>
</td>
`;

row.querySelector("button").addEventListener("click", () => {
deleteEvent(event.id);
});

table.appendChild(row);

});

}



// DELETE EVENT
async function deleteEvent(id){

if(!confirm("Are you sure you want to delete this event?")) return;

await fetch(`${API_URL}/${id}`,{
method:"DELETE"
});

loadEvents();

}



// INITIAL LOAD
loadEvents();

</script>

</body>

</html>
