<!DOCTYPE html>

<html lang="en">

<head>

```
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="EventSphere - Discover and register for exciting workshops, webinars, conferences and bootcamps.">
<meta name="keywords" content="events, workshops, webinars, bootcamp, conference, event registration">
<meta name="author" content="EventSphere">

<title>EventSphere | Discover Events</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
```

</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="#">EventSphere</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">

<a class="nav-link active" href="index.html">Events</a>

</li>

<li class="nav-item">

<a class="nav-link" href="add-event.html">Admin Panel</a>

</li>

</ul>

</div>

</div>

</nav>


<section class="container mt-5 text-center">

<h1>Available Events</h1>

<p class="text-muted">
Explore upcoming workshops, conferences, and bootcamps
</p>

</section>


<section class="container mt-4">

<div class="row" id="eventList">


</div>

</section>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script>

const API_URL = "http://localhost:3000/events";



async function loadEvents() {

try {

const response = await fetch(API_URL);

const events = await response.json();

displayEvents(events);

}

catch (error) {

console.error("Error loading events:", error);

}

}



function displayEvents(events) {

const container = document.getElementById("eventList");

container.innerHTML = "";



events.forEach(event => {

const card = `

<div class="col-md-4 mb-4">

<div class="card shadow">

<div class="card-body">

<h5 class="card-title">${event.title}</h5>

<p class="card-text">${event.description}</p>

<p><strong>Date:</strong> ${event.date}</p>

<p><strong>Location:</strong> ${event.location}</p>

<p><strong>Available Seats:</strong> ${event.availableSeats}</p>

<a href="register.html?eventId=${event.id}" class="btn btn-primary">
Register
</a>

</div>

</div>

</div>

`;

container.innerHTML += card;

});

}



loadEvents();

</script>

</body>

</html>
