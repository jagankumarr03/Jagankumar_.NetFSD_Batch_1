<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Electronics Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container py-5">

<h2 class="text-center mb-4">Electronics Products</h2>

<div class="row g-4">

<div class="col-12 col-md-6 col-lg-3">
<div class="card h-100 shadow-sm">

<img src="https://via.placeholder.com/300x200" class="card-img-top" alt="product">

<div class="card-body text-center">

<h5 class="card-title">Smartphone</h5>
<p class="card-text">Latest Android smartphone with high performance.</p>
<h6 class="text-primary">₹25,999</h6>

</div>

<div class="card-footer bg-white border-0 text-center">
<button class="btn btn-success btn-sm me-2">Add to Cart</button>
<button class="btn btn-primary btn-sm">View Details</button>
</div>

</div>
</div>


<div class="col-12 col-md-6 col-lg-3">
<div class="card h-100 shadow-sm">

<img src="https://via.placeholder.com/300x200" class="card-img-top">

<div class="card-body text-center">

<h5 class="card-title">Laptop</h5>
<p class="card-text">Powerful laptop for work and gaming.</p>
<h6 class="text-primary">₹65,000</h6>

</div>

<div class="card-footer bg-white border-0 text-center">
<button class="btn btn-success btn-sm me-2">Add to Cart</button>
<button class="btn btn-primary btn-sm">View Details</button>
</div>

</div>
</div>


<div class="col-12 col-md-6 col-lg-3">
<div class="card h-100 shadow-sm">

<img src="https://via.placeholder.com/300x200" class="card-img-top">

<div class="card-body text-center">

<h5 class="card-title">Smart Watch</h5>
<p class="card-text">Track your health and notifications.</p>
<h6 class="text-primary">₹7,999</h6>

</div>

<div class="card-footer bg-white border-0 text-center">
<button class="btn btn-success btn-sm me-2">Add to Cart</button>
<button class="btn btn-primary btn-sm">View Details</button>
</div>

</div>
</div>


<div class="col-12 col-md-6 col-lg-3">
<div class="card h-100 shadow-sm">

<img src="https://via.placeholder.com/300x200" class="card-img-top">

<div class="card-body text-center">

<h5 class="card-title">Wireless Earbuds</h5>
<p class="card-text">High quality sound with noise cancellation.</p>
<h6 class="text-primary">₹3,499</h6>

</div>

<div class="card-footer bg-white border-0 text-center">
<button class="btn btn-success btn-sm me-2">Add to Cart</button>
<button class="btn btn-primary btn-sm">View Details</button>
</div>

</div>
</div>

</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
